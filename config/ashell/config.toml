[appearance]

style = "Islands"

font_name = "JetBrainsMono"

opacity = 0.5

[appearance.menu]
opacity = 0.7
backdrop = 0.3

primary_color = "#7aa2f7"
success_color = "#9ece6a"
text_color = "#33ccff"

workspace_colors = [ "#7aa2f7", "#9ece6a" ]

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#1a1b26"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0c0d14"
