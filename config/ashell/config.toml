log_level = "warn"
outputs = { Targets = ["eDP-1"] }
position = "Top"

[modules]
left = [ [ "Workspaces", "MediaPlayer" ] ]
center = [ "Tempo" ]
right = [ "Tray", "SystemInfo", [ "Privacy", "Settings" ], "CustomNotifications" ]

#[updates]
#check_cmd = "checkupdates; paru -Qua"
#update_cmd = 'alacritty -e bash -c "paru; echo Done - Press enter to exit; read" &'
#interval = 3600

[osd]
enabled = true   # Disabled by default; set to true to enable the OSD overlay
timeout = 1500   # Auto-hide delay in milliseconds

[workspaces]
visibility_mode = "All"
group_by_monitor = false
enable_workspace_filling = true

[[CustomModule]]
name = "CustomNotifications"
type = "Button"
icon = ""
command = "swaync-client -t -sw"
listen_cmd = "swaync-client -swb"
icons.'dnd.*' = ""
alert = ".*notification"

[media_player]
max_title_length = 50
#indicator_format = "Icon"

#[[CustomModule]]
#name = "appLauncher"
#icon = "󱗼"
#command = "walker"

[window_title]
mode = "Title"
truncate_title_after_length = 100

[system_info]
indicators = [ "Cpu", "Memory" ]
interval = 5

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

#[system_info.temperature]
#warn_threshold = 60
#alert_threshold = 80
#sensor = "acpitz temp1"

[tempo]
clock_format = "%R %b %d %a"
# formats = [ "%a %d %b %R", "%Y-%m-%d %H:%M:%S", "%H:%M:%S" ]
# timezones = [ "UTC", "America/New_York", "Europe/London" ]
weather_location = { City = "Budapest" }
# weather_location = { Coordinates = [40.7128, -74.0060] }
# weather_location = "Current"
weather_indicator = "IconAndTemperature"

[settings]
lock_cmd = "playerctl --all-players pause; hyprlock &"
logout_cmd = "uwsm stop"
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
bluetooth_more_cmd = "blueberry"
battery_format = "IconAndPercentage"
peripheral_battery_format = "Icon"
audio_indicator_format = "Icon"
microphone_indicator_format = "Icon"
network_indicator_format = "Icon"
vpn_indicator_format = "Icon"
bluetooth_indicator_format = "Icon"
brightness_indicator_format = "Icon"
indicators = [ "IdleInhibitor", "PowerProfile", "Audio", "Microphone", "Bluetooth", "Network", "Vpn", "Battery", "Brightness" ]

#[[settings.CustomButton]]
#name = "Virtual Keyboard"
#icon = "⌨️"
#command = "/path/to/toggle-keyboard.sh"
#status_command = "/path/to/check-keyboard-status.sh"
#tooltip = "Toggle On-Screen Keyboard"

