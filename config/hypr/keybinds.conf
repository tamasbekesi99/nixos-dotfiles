###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = kitty -e yazi
$browser = librewolf
#$browser = brave
#$menu = wofi --show drun
#$menu = rofi -show drun
#$menu = rofi -show drun -run-command "uwsm app -- {cmd}"
#$menu = fuzzel "--launch-prefix=uwsm app --"
#$menu = fuzzel "--launch-prefix=app2unit --"
$menu = dms ipc call spotlight toggle 
$reload_waybar = pkill waybar; waybar &
$snip = grim -g "$(slurp)" - | swappy -f -

####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
#bind = $mainMod, Return, exec, uwsm app -- $terminal
bind = $mainMod, Return, exec, app2unit -- $terminal
bind = $mainMod, Q, killactive,
#bind = $mainMod, W, exec, [workspace 2] uwsm app -- $browser
#bind = $mainMod, W, exec, uwsm app -- $browser
bind = $mainMod, W, exec, app2unit -- $browser
#bind = $mainMod Alt, W, exec, waypaper --random
bind = $mainMod, M, exit,
#bind = $mainMod, E, exec, [workspace 3] uwsm app -- $fileManager
bind = $mainMod, E, exec, [workspace 3] app2unit -- $fileManager
#bind = $mainMod, T, exec, [workspace 4] uwsm app -- thunderbird
bind = $mainMod, T, exec, [workspace 4] app2unit -- thunderbird
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen
bind = $mainMod, D, exec, $menu
#bind = $mainMod Alt, L, exec, hyprlock
bind = $mainMod Alt, L, exec, dms ipc call lock lock
bind = $mainMod, S, exec, $snip
bind = $mainMod, TAB, exec, dms ipc call hypr toggleOverview

# Move focus with mainMod + vim arrow keys
bind = $mainMod, l, movefocus, l
bind = $mainMod, h, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

#Resize windows
bind = $mainMod, R, submap, resize                                     # <MAIN+R ( )>
submap=resize
  binde = , H, resizeactive, -20  0                     # <H>
  binde = , J, resizeactive,  0   20                    # <J>
  binde = , K, resizeactive,  0  -20                    # <K>
  binde = , L, resizeactive,  20  0                     # <L>
  binde = , Left, resizeactive, -10  0                     # <Left>
  binde = , Down, resizeactive,  0   10                    # <Down>
  binde = , Up,   resizeactive,  0  -10                    # <Up>
  binde = , Right, resizeactive,  10  0                     # <Right>
# Quit submap
bind  = , R,      submap, reset                                         # <R>
bindt = , escape, submap, reset                                         # <ESC>
submap = reset

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Opacity for inactive windows
windowrule = opacity 0.9 0.9, match:float 0, match:focus 0
windowrule = float on, match:class ^(blueman-manager)$
# Open DMS windows as floating by default
windowrule = float on, match:class ^(org.quickshell)$
# GNOME apps
windowrule = rounding 12, border_size 0, match:class ^(org\.gnome\.)
# Terminal app - no borders
windowrule = border_size 0, match:class ^(kitty)$

#Audio and brightness controls
bind = ,XF86AudioRaiseVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = ,XF86AudioLowerVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind =,XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind =,XF86MonBrightnessUp,exec,brightnessctl set +5% 

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

